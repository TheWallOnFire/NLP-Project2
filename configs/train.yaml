# Training Configuration for Banking Intent Detection
model_name: "unsloth/llama-3-8b-bnb-4bit"
max_seq_length: 2048
load_in_4bit: true

# Data paths
train_data_path: "sample_data/train.csv"
output_dir: "models/intent_model"

# Hyperparameters
batch_size: 2
learning_rate: 2.0e-4
max_steps: 60
optimizer: "adamw_8bit"
